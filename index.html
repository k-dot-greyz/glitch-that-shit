<!DOCTYPE html>
<html lang="en" data-color-scheme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>glitch-that-shit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 11px;
      background: var(--zen-bg, #0d0d0b);
      color: var(--zen-text, #d4d3cf);
      padding: 12px;
    }
    .zen-popup { display: flex; flex-direction: column; gap: 10px; }
    header {
      display: flex; align-items: center; gap: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--zen-border, #2a2a26);
    }
    .zen-logo { font-size: 14px; }
    .zen-title { font-weight: 700; font-size: 11px; letter-spacing: 0.08em; flex: 1; color: var(--zen-accent, #00e5a0); }
    #btn-reset {
      background: none; border: 1px solid var(--zen-border, #2a2a26);
      color: var(--zen-muted, #706f6a); border-radius: 4px;
      padding: 2px 6px; cursor: pointer; font-size: 11px;
    }
    #btn-reset:hover { color: var(--zen-text); }
    .zen-section { display: flex; flex-direction: column; gap: 4px; }
    .zen-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--zen-muted, #706f6a); text-transform: uppercase;
      display: flex; justify-content: space-between;
    }
    .zen-val { color: var(--zen-accent, #00e5a0); font-weight: 400; }
    .zen-toggle-group { display: flex; flex-wrap: wrap; gap: 4px; }
    .zen-toggle {
      padding: 3px 8px; border-radius: 4px; cursor: pointer;
      font: inherit; font-size: 9px; font-weight: 600;
      background: var(--zen-surface, #131311);
      border: 1px solid var(--zen-border, #2a2a26);
      color: var(--zen-muted, #706f6a);
      transition: all 120ms ease;
    }
    .zen-toggle.active, .zen-toggle:hover {
      border-color: var(--zen-accent, #00e5a0);
      color: var(--zen-accent, #00e5a0);
    }
    input[type="range"] {
      width: 100%; accent-color: var(--zen-accent, #00e5a0);
      height: 4px; cursor: pointer;
    }
    .zen-toggles { flex-direction: row; gap: 12px; }
    .zen-check {
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; color: var(--zen-muted, #706f6a);
      font-size: 10px;
    }
    .zen-check input { accent-color: var(--zen-accent, #00e5a0); cursor: pointer; }
    .zen-preview {
      border: 1px solid var(--zen-border, #2a2a26);
      background: var(--zen-surface, #131311);
      border-radius: 6px; padding: 8px 10px;
      border-left: 3px solid var(--zen-accent, #00e5a0);
    }
    .zen-preview-text {
      color: var(--zen-text, #d4d3cf);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
